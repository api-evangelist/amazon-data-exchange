  /tags/{resourceArn}:
    get:
      operationId: listTagsForResource
      summary: List Tags for Resource
      description: Returns the list of tags associated with a Data Exchange resource.
      tags:
        - Tags
      parameters:
        - name: resourceArn
          in: path
          required: true
          description: The ARN of the Data Exchange resource. This ARN uniquely identifies the resource.
          schema:
            type: string
      responses:
        '200':
          description: Tags returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTagsResponse'
              examples:
                default:
                  x-microcks-default: true
                  value:
                    Tags:
                      Environment: Production
                      Team: Analytics
                      Project: MarketData2024
    post:
      operationId: tagResource
      summary: Tag Resource
      description: Adds tags to a Data Exchange resource.
      tags:
        - Tags
      parameters:
        - name: resourceArn
          in: path
          required: true
          description: The ARN of the Data Exchange resource. This ARN uniquely identifies the resource.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagResourceRequest'
            examples:
              default:
                x-microcks-default: true
                value:
                  Tags:
                    Department: Engineering
                    CostCenter: CC-2024
      responses:
        '204':
          description: Tags added successfully
    delete:
      operationId: untagResource
      summary: Untag Resource
      description: Removes tags from a Data Exchange resource.
      tags:
        - Tags
      parameters:
        - name: resourceArn
          in: path
          required: true
          description: The ARN of the Data Exchange resource. This ARN uniquely identifies the resource.
          schema:
            type: string
        - name: tagKeys
          in: query
          required: true
          description: The tag keys to remove
          schema:
            type: array
            items:
              type: string
      responses:
        '204':
          description: Tags removed successfully

components:
  securitySchemes:
    awsSignatureV4:
      type: apiKey
      in: header
      name: Authorization
      description: AWS Signature Version 4 authentication

  schemas:
    DataSet:
      description: An AWS Data Exchange data set containing a collection of data available for subscription.
      type: object
      properties:
        Id:
          type: string
          description: The unique identifier of the data set
        Arn:
          type: string
          description: The ARN of the data set. This ARN uniquely identifies the data set.
        Name:
          type: string
          description: The name of the data set
        Description:
          type: string
          description: The description of the data set
        AssetType:
          type: string
          description: The type of asset contained in the data set
          enum: [S3_SNAPSHOT, REDSHIFT_DATA_SHARE, API_GATEWAY_API, LAKE_FORMATION_DATA_PERMISSION, S3_DATA_ACCESS]
        Origin:
          type: string
          description: Whether the data set is owned or entitled
          enum: [OWNED, ENTITLED]
        OriginDetails:
          type: object
          description: Details about the origin of the data set
          properties:
            ProductId:
              type: string
        Tags:
          type: object
          description: Tags associated with the data set
          additionalProperties:
            type: string
        CreatedAt:
          type: string
          format: date-time
          description: When the data set was created
        UpdatedAt:
          type: string
          format: date-time
          description: When the data set was last updated

    CreateDataSetRequest:
      description: Request body for creating a new data set.
      type: object
      required:
        - Name
        - Description
        - AssetType
      properties:
        Name:
          type: string
          description: The name of the data set
        Description:
          type: string
          description: The description of the data set
        AssetType:
          type: string
          description: The type of asset for this data set
          enum: [S3_SNAPSHOT, REDSHIFT_DATA_SHARE, API_GATEWAY_API, LAKE_FORMATION_DATA_PERMISSION, S3_DATA_ACCESS]
        Tags:
          type: object
          description: Tags to add to the data set
          additionalProperties:
            type: string

    UpdateDataSetRequest:
      description: Request body for updating a data set.
      type: object
      properties:
        Name:
          type: string
          description: The new name for the data set
        Description:
          type: string
          description: The new description for the data set

    ListDataSetsResponse:
      description: Response containing a list of data sets.
      type: object
      properties:
        DataSets:
          type: array
          items:
            $ref: '#/components/schemas/DataSet'
        NextToken:
          type: string
          description: Pagination token for the next page

    Revision:
      description: A revision of a data set, representing a snapshot of data at a point in time.
      type: object
      properties:
        Id:
          type: string
          description: The unique identifier of the revision
        Arn:
          type: string
          description: The ARN of the revision. This ARN uniquely identifies the revision.
        DataSetId:
          type: string
          description: The ID of the data set this revision belongs to
        Comment:
          type: string
          description: A comment describing the revision
        Finalized:
          type: boolean
          description: Whether the revision has been finalized for publishing
        Tags:
          type: object
          description: Tags associated with the revision
          additionalProperties:
            type: string
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time

    CreateRevisionRequest:
      description: Request body for creating a new revision.
      type: object
      properties:
        Comment:
          type: string
          description: A comment describing the revision
          maxLength: 16384
        Tags:
          type: object
          additionalProperties:
            type: string

    UpdateRevisionRequest:
      description: Request body for updating a revision.
      type: object
      properties:
        Comment:
          type: string
          description: An updated comment for the revision
        Finalized:
          type: boolean
          description: Set to true to finalize the revision for publishing

    ListDataSetRevisionsResponse:
      description: Response containing a list of revisions.
      type: object
      properties:
        Revisions:
          type: array
          items:
            $ref: '#/components/schemas/Revision'
        NextToken:
          type: string

    Asset:
      description: An asset within a data set revision, representing an individual piece of data.
      type: object
      properties:
        Id:
          type: string
          description: The unique identifier of the asset
        Arn:
          type: string
          description: The ARN of the asset. This ARN uniquely identifies the asset.
        DataSetId:
          type: string
        RevisionId:
          type: string
        Name:
          type: string
          description: The name of the asset
        AssetType:
          type: string
          enum: [S3_SNAPSHOT, REDSHIFT_DATA_SHARE, API_GATEWAY_API, LAKE_FORMATION_DATA_PERMISSION, S3_DATA_ACCESS]
        AssetDetails:
          type: object
          description: Type-specific details about the asset
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time

    UpdateAssetRequest:
      description: Request body for updating an asset.
      type: object
      required:
        - Name
      properties:
        Name:
          type: string
          description: The new name for the asset

    ListRevisionAssetsResponse:
      description: Response containing a list of assets.
      type: object
      properties:
        Assets:
          type: array
          items:
            $ref: '#/components/schemas/Asset'
        NextToken:
          type: string

    Job:
      description: A Data Exchange job for importing or exporting assets.
      type: object
      properties:
        Id:
          type: string
          description: The unique identifier of the job
        Arn:
          type: string
          description: The ARN of the job. This ARN uniquely identifies the job.
        Type:
          type: string
          description: The type of job
          enum: [IMPORT_ASSETS_FROM_S3, IMPORT_ASSET_FROM_SIGNED_URL, EXPORT_ASSETS_TO_S3, EXPORT_ASSET_TO_SIGNED_URL, IMPORT_ASSETS_FROM_REDSHIFT_DATA_SHARES, EXPORT_REVISIONS_TO_S3, IMPORT_ASSET_FROM_API_GATEWAY_API, CREATE_S3_DATA_ACCESS_FROM_S3_BUCKET, IMPORT_ASSETS_FROM_LAKE_FORMATION_TAG_POLICY]
        State:
          type: string
          description: Current state of the job
          enum: [WAITING, IN_PROGRESS, ERROR, COMPLETED, CANCELLED, TIMED_OUT]
        Details:
          type: object
          description: Job-type-specific details
        Errors:
          type: array
          items:
            type: object
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time

    CreateJobRequest:
      description: Request body for creating a new job.
      type: object
      required:
        - Type
        - Details
      properties:
        Type:
          type: string
          description: The type of job to create
          enum: [IMPORT_ASSETS_FROM_S3, IMPORT_ASSET_FROM_SIGNED_URL, EXPORT_ASSETS_TO_S3, EXPORT_ASSET_TO_SIGNED_URL, IMPORT_ASSETS_FROM_REDSHIFT_DATA_SHARES, EXPORT_REVISIONS_TO_S3, IMPORT_ASSET_FROM_API_GATEWAY_API, CREATE_S3_DATA_ACCESS_FROM_S3_BUCKET, IMPORT_ASSETS_FROM_LAKE_FORMATION_TAG_POLICY]
        Details:
          type: object
          description: Job-type-specific configuration

    StartJobResponse:
      description: Response after starting a job.
      type: object
      properties:
        JobId:
          type: string
        State:
          type: string

    ListJobsResponse:
      description: Response containing a list of jobs.
      type: object
      properties:
        Jobs:
          type: array
          items:
            $ref: '#/components/schemas/Job'
        NextToken:
          type: string

    EventAction:
      description: An event action that automates responses to Data Exchange events.
      type: object
      properties:
        Id:
          type: string
          description: The unique identifier of the event action
        Arn:
          type: string
          description: The ARN of the event action. This ARN uniquely identifies the event action.
        Event:
          type: object
          description: The event that triggers this action
        Action:
          type: object
          description: The action to perform when the event occurs
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time

    CreateEventActionRequest:
      description: Request body for creating a new event action.
      type: object
      required:
        - Event
        - Action
      properties:
        Event:
          type: object
          description: The event that triggers the action
        Action:
          type: object
          description: The action to perform when the event occurs

    UpdateEventActionRequest:
      description: Request body for updating an event action.
      type: object
      required:
        - Action
      properties:
        Action:
          type: object
          description: The updated action configuration

    ListEventActionsResponse:
      description: Response containing a list of event actions.
      type: object
      properties:
        EventActions:
          type: array
          items:
            $ref: '#/components/schemas/EventAction'
        NextToken:
          type: string

    ListTagsResponse:
      description: Response containing tags for a resource.
      type: object
      properties:
        Tags:
          type: object
          description: The tags associated with the resource
          additionalProperties:
            type: string

    TagResourceRequest:
      description: Request body for adding tags to a resource.
      type: object
      required:
        - Tags
      properties:
        Tags:
          type: object
          description: The tags to add to the resource
          additionalProperties:
            type: string

    Error:
      description: Standard error response from the Data Exchange API.
      type: object
      properties:
        message:
          type: string
          description: A human-readable error message
        code:
          type: string
          description: An error code identifying the type of error
        requestId:
          type: string
          description: The unique ID of the request that resulted in this error
