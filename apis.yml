apis:
  - aid: amazon-data-exchange:aws-data-exchange-api
    name: AWS Data Exchange API
    description: >-
      The AWS Data Exchange API enables programmatic access to find, subscribe
      to, and use third-party data products. It supports managing data sets,
      revisions, assets, jobs, and event actions for cloud-based data exchange
      workflows including S3 snapshot data, Redshift data shares, API Gateway
      APIs, and Lake Formation permissions.
