aid: amazon-data-exchange
name: Amazon Data Exchange
description: >-
  AWS Data Exchange makes it easy to find, subscribe to, and use third-party
  data in the cloud. Qualified data providers can publish data products
  consisting of data sets with versioned revisions and assets including S3
  snapshots, Redshift data shares, API Gateway APIs, and Lake Formation
  permissions. Subscribers can find and subscribe to data products directly
  in the AWS Management Console and use the Data Exchange API to load data
  into Amazon S3 for analysis with AWS analytics and machine learning services.
