aid: amazon-data-exchange
name: Amazon Data Exchange
description: >-
  AWS Data Exchange makes it easy to find, subscribe to, and use third-party
  data in the cloud. Qualified data providers can publish data products and
  subscribers can find and subscribe to them directly in the AWS Management
  Console. Once subscribed, subscribers can use the AWS SDKs or the Data
  Exchange API to load data directly into Amazon S3 and then analyze it with
  a variety of AWS analytics and machine learning services.
