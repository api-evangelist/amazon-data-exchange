  - type: Features
    data:
      - name: Data Set Management
        description: >-
          Create, update, and manage data sets containing versioned collections
          of data available for subscription and distribution in the marketplace.
      - name: Revision Publishing
        description: >-
          Organize data into versioned revisions with comments, then finalize
          and publish them to make data available to subscribers automatically.
      - name: Multi-Format Asset Support
        description: >-
          Support for S3 snapshots, Redshift data shares, API Gateway APIs,
          Lake Formation permissions, and S3 data access as asset types.
      - name: Import and Export Jobs
        description: >-
          Asynchronous import/export jobs for transferring data between external
          sources (S3, Redshift) and Data Exchange revisions at scale.
      - name: Event-Driven Delivery
        description: >-
          Configurable event actions that automatically export revision data
          to S3 when a new revision is published, eliminating manual downloads.
      - name: AWS Marketplace Integration
        description: >-
          Seamlessly list and sell data products in AWS Marketplace with
          built-in billing, subscription management, and entitlement enforcement.
      - name: Fine-Grained Access Control
        description: >-
          Control access to data products using AWS IAM policies and resource-
          level permissions with ARN-based resource identification.
  - type: UseCases
    data:
      - name: Third-Party Data Acquisition
        description: >-
          Subscribe to curated third-party datasets from financial data providers,
          healthcare data aggregators, weather services, and market research firms.
      - name: Data Product Monetization
        description: >-
          Publish and sell proprietary datasets to other AWS customers via the
          marketplace with automated billing and subscription management.
      - name: Automated Data Pipelines
        description: >-
          Configure event actions to automatically deliver new data revisions to
          S3, enabling downstream analytics pipelines to process fresh data.
      - name: ML Training Data
        description: >-
          Access high-quality labeled datasets and specialized data products
          from Data Exchange to train and improve machine learning models.
      - name: Regulatory Compliance Data
        description: >-
          Subscribe to compliance reference data including sanctions lists,
          legal entity identifiers, and regulatory taxonomies via Data Exchange.
  - type: Integrations
    data:
      - name: Amazon S3
        description: >-
          Primary storage integration for Data Exchange assets — used as both
          source for imports and destination for exports via job operations.
      - name: Amazon Redshift
        description: >-
          Share Redshift tables and views directly through Data Exchange
          without copying data, enabling live query access for subscribers.
      - name: AWS Lake Formation
        description: >-
          Distribute Lake Formation data permissions through Data Exchange,
          giving subscribers governed access to data lake resources.
      - name: Amazon API Gateway
        description: >-
          Expose API-based data products through Data Exchange, allowing
          subscribers to call APIs for real-time data access.
      - name: AWS Glue
        description: >-
          Catalog and transform Data Exchange S3 datasets using AWS Glue
          for ETL and data lake integration workflows.
      - name: Amazon Athena
        description: >-
          Query Data Exchange S3 snapshot data directly with SQL using
          Athena for serverless analytics on subscribed datasets.
      - name: Amazon SageMaker
        description: >-
          Use third-party datasets from Data Exchange as training data for
          machine learning models in Amazon SageMaker.
